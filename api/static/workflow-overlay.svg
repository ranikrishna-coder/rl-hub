<svg width="280" height="220" viewBox="0 0 280 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aw-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="aw-grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#233F92"/>
    </linearGradient>
  </defs>
  <!-- Agent -->
  <rect x="20" y="90" width="56" height="40" rx="8" fill="url(#aw-grad1)" opacity="0.9"/>
  <text x="48" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="system-ui,sans-serif">Agent</text>
  <!-- Arrow to Environment -->
  <path d="M76 110 H104" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4 3" opacity="0.8"/>
  <polygon points="104 106 112 110 104 114" fill="#7c3aed"/>
  <!-- Environment -->
  <rect x="112" y="90" width="56" height="40" rx="8" fill="url(#aw-grad2)" opacity="0.9"/>
  <text x="140" y="114" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="system-ui,sans-serif">Environment</text>
  <!-- Arrow to Observation -->
  <path d="M168 110 H196" stroke="#233F92" stroke-width="2" stroke-dasharray="4 3" opacity="0.8"/>
  <polygon points="196 106 204 110 196 114" fill="#233F92"/>
  <!-- Observation -->
  <rect x="204" y="90" width="56" height="40" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="232" y="114" text-anchor="middle" fill="#475569" font-size="10" font-weight="600" font-family="system-ui,sans-serif">Observation</text>
  <!-- Feedback loop (Action back to Agent) -->
  <path d="M260 110 H278 V170 H20 V130 H48" stroke="#c026d3" stroke-width="1.5" fill="none" stroke-dasharray="5 4" opacity="0.7"/>
  <text x="149" y="195" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="600" font-family="system-ui,sans-serif">Action ’ Reward ’ Agent</text>
  <!-- Decorative nodes -->
  <circle cx="48" cy="130" r="4" fill="#7c3aed" opacity="0.6"/>
  <circle cx="140" cy="130" r="4" fill="#233F92" opacity="0.6"/>
  <circle cx="232" cy="130" r="4" fill="#64748b" opacity="0.6"/>
</svg>
