version: '3.8'

services:
  agentwork-simulator:
    build: .
    container_name: agentwork-simulator
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models
      - ./api/data:/app/api/data
      - ./hf_spaces:/app/hf_spaces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

