name: Deploy to GitHub Pages

# Only on manual trigger so pushes to main don't fail if Pages isn't enabled.
# Enable in Settings → Pages → Source: GitHub Actions, then run this workflow.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Skip if Pages isn't enabled (deploy-pages will fail with "Get Pages site failed")
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Prepare static files
      env:
        API_URL: ${{ secrets.API_URL || '' }}
      run: |
        echo "📦 Preparing static files for GitHub Pages..."
        mkdir -p _site
        
        # Copy all static files to root of _site
        cp -r api/static/* _site/
        
        # Create config.js with API endpoint
        cat > _site/config.js <<EOF
        // API Configuration for GitHub Pages
        window.API_BASE = window.API_BASE || '${API_URL}';
        console.log('🚀 AgentWork Simulator - API Base URL:', window.API_BASE);
        EOF
        
        # Verify files are in place
        echo "📁 Files in _site:"
        ls -la _site/ | head -20
        
        # Verify index.html exists
        if [ ! -f "_site/index.html" ]; then
          echo "❌ ERROR: index.html not found!"
          exit 1
        fi
        
        # Verify config.js was created
        if [ ! -f "_site/config.js" ]; then
          echo "❌ ERROR: config.js not created!"
          exit 1
        fi
        
        echo "✅ Static files prepared"
        echo "📄 index.html exists: $(test -f _site/index.html && echo 'YES' || echo 'NO')"
        echo "📄 config.js exists: $(test -f _site/config.js && echo 'YES' || echo 'NO')"
        echo "📄 app.js exists: $(test -f _site/app.js && echo 'YES' || echo 'NO')"
        echo "📄 styles.css exists: $(test -f _site/styles.css && echo 'YES' || echo 'NO')"
        echo "🌐 API URL configured: ${API_URL}"

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Deployment summary
      run: |
        echo "## 🚀 Deployed to GitHub Pages" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Frontend deployed successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Access URLs:" >> $GITHUB_STEP_SUMMARY
        echo "- **GitHub Pages**: \`https://\${{ github.repository_owner }}.github.io/\${{ github.event.repository.name }}/\`" >> $GITHUB_STEP_SUMMARY
        echo "- **API Endpoint**: \`${API_URL}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Files Deployed:" >> $GITHUB_STEP_SUMMARY
        echo "- index.html" >> $GITHUB_STEP_SUMMARY
        echo "- config.js (API: ${API_URL})" >> $GITHUB_STEP_SUMMARY
        echo "- app.js, styles.css, and all assets" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
        echo "1. Enable GitHub Pages: **Settings → Pages → Source: GitHub Actions**" >> $GITHUB_STEP_SUMMARY
        echo "2. Visit: \`https://<owner>.github.io/<repo>/\` (replace owner/repo with your repository)" >> $GITHUB_STEP_SUMMARY
        echo "3. To deploy again: Actions → Deploy to GitHub Pages → Run workflow" >> $GITHUB_STEP_SUMMARY
