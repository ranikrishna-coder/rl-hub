<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="fade-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="fade-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Agent workflow nodes and connections -->
    <pattern id="dots" patternUnits="userSpaceOnUse" width="48" height="48">
      <circle cx="8" cy="8" r="0.8" fill="#7c3aed" opacity="0.14"/>
      <circle cx="28" cy="24" r="0.6" fill="#a855f7" opacity="0.1"/>
      <circle cx="44" cy="12" r="0.7" fill="#9333ea" opacity="0.12"/>
      <circle cx="20" cy="40" r="0.5" fill="#c026d3" opacity="0.08"/>
      <circle cx="36" cy="36" r="0.6" fill="#7c3aed" opacity="0.09"/>
    </pattern>
    <pattern id="lines" patternUnits="userSpaceOnUse" width="96" height="96">
      <line x1="0" y1="24" x2="48" y2="24" stroke="#7c3aed" stroke-width="0.35" opacity="0.06"/>
      <line x1="24" y1="0" x2="24" y2="48" stroke="#a855f7" stroke-width="0.3" opacity="0.05"/>
      <line x1="0" y1="48" x2="48" y2="0" stroke="#9333ea" stroke-width="0.25" opacity="0.04"/>
      <line x1="12" y1="12" x2="36" y2="36" stroke="#c026d3" stroke-width="0.25" opacity="0.04"/>
    </pattern>
  </defs>
  <!-- Soft trajectory curve: agent -> environment -> reward loop -->
  <path d="M0 180 Q400 100 700 140 T1200 200" stroke="#7c3aed" stroke-width="0.6" fill="none" opacity="0.045"/>
  <path d="M100 320 L400 260 L700 290 L1000 250" stroke="#a855f7" stroke-width="0.4" fill="none" opacity="0.035"/>
  <!-- Feedback ellipse (RL cycle) -->
  <ellipse cx="720" cy="160" rx="320" ry="100" stroke="#7c3aed" stroke-width="0.4" fill="none" opacity="0.03"/>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <rect width="100%" height="100%" fill="url(#lines)"/>
  <rect width="100%" height="100%" fill="url(#fade-v)"/>
  <rect width="100%" height="100%" fill="url(#fade-h)"/>
</svg>
